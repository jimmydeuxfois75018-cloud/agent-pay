name: Daily Install & Test

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  install-test:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install from PyPI
        run: pip install agentpay-protocol
      - name: Test import and wallet
        run: |
          python -c "
          from agent_pay import AgentPay
          p = AgentPay(testnet=True)
          print('OK:', p.address)
          print('ETH:', p.balance('ETH'))
          "
